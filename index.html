<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flight Deals</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --brand:#2563eb; --brand-ink:#1d4ed8;
    --good:#0369a1; --good-bg:#e0f2fe; --great:#047857; --great-bg:#d1fae5;
    --exceptional:#b45309; --exceptional-bg:#fef3c7;
    --live:#16a34a; --live-bg:#dcfce7;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0b1120; --card:#111a2e; --ink:#e5edff; --muted:#93a4c3;
      --line:#22304d; --brand:#60a5fa; --brand-ink:#93c5fd;
      --good:#7dd3fc; --good-bg:#0c3a54; --great:#6ee7b7; --great-bg:#064e3b;
      --exceptional:#fcd34d; --exceptional-bg:#4a3208;
      --live:#4ade80; --live-bg:#0f3d24;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  a{color:var(--brand-ink);text-decoration:none}
  .wrap{max-width:1000px;margin:0 auto;padding:20px 16px 64px}
  header{margin-bottom:16px}
  h1{font-size:26px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--muted);font-size:13px}
  /* status banner */
  .status{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin:14px 0 18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .status .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;font-weight:600;
    font-size:12.5px;padding:4px 10px;border-radius:999px;background:var(--line);color:var(--ink)}
  .pill.live{background:var(--live-bg);color:var(--live)}
  .dot{width:8px;height:8px;border-radius:50%;background:currentColor;
    box-shadow:0 0 0 0 currentColor}
  .pill.live .dot{animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)}
    70%{box-shadow:0 0 0 7px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}
  .bar{height:8px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:10px}
  .bar > i{display:block;height:100%;background:var(--brand);border-radius:999px;
    transition:width .5s ease}
  .queue{margin-top:10px;color:var(--muted);font-size:13px}
  .queue b{color:var(--ink)}
  .qchip{display:inline-block;background:var(--line);border-radius:8px;
    padding:2px 8px;margin:3px 4px 0 0;font-size:12px}
  /* controls */
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  input[type=search],select{font:inherit;padding:9px 12px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--ink)}
  input[type=search]{flex:1 1 220px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{font:inherit;border:0;background:var(--card);color:var(--muted);
    padding:9px 12px;cursor:pointer}
  .seg button.on{background:var(--brand);color:#fff}
  .count{color:var(--muted);font-size:13px;margin-left:auto}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:-4px 0 16px}
  .filters label{display:inline-flex;align-items:center;gap:6px;font-size:13px;
    color:var(--muted);background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:5px 10px}
  .filters label input{width:72px;border:0;background:transparent;color:var(--ink);
    font:inherit;padding:2px 0}
  .filters label input:focus{outline:none}
  .filters .u{color:var(--muted);font-weight:600}
  .filters select{font:inherit;padding:7px 10px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--ink)}
  .clr{font:inherit;border:1px solid var(--line);background:var(--card);
    color:var(--brand-ink);border-radius:10px;padding:7px 12px;cursor:pointer}
  .filters .chk{cursor:pointer}
  .filters input[type=date]{font:inherit;border:0;background:transparent;color:var(--ink);width:120px}
  /* multi-select */
  .ms{position:relative}
  .ms-btn{font:inherit;padding:7px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);cursor:pointer;white-space:nowrap}
  .ms-btn.on{border-color:var(--brand);color:var(--brand-ink);font-weight:600}
  .ms-pop{position:absolute;z-index:20;top:calc(100% + 4px);left:0;min-width:230px;
    max-width:320px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 8px 28px rgba(0,0,0,.18);padding:8px}
  .ms-search{width:100%;font:inherit;padding:7px 9px;border-radius:8px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink);margin-bottom:6px}
  .ms-list{max-height:260px;overflow:auto}
  .ms-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;
    font-size:14px;cursor:pointer}
  .ms-item:hover{background:var(--bg)}
  .ms-empty{color:var(--muted);font-size:13px;padding:8px 6px}
  .ms-actions{display:flex;justify-content:space-between;gap:8px;margin-top:6px;
    border-top:1px solid var(--line);padding-top:6px}
  .ms-actions button{font:inherit;font-size:13px;border:0;background:transparent;
    color:var(--brand-ink);cursor:pointer;padding:4px 6px}
  /* deal cards */
  .deals{display:grid;gap:10px}
  .deal{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:6px 14px;
    align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .route{font-size:18px;font-weight:700;letter-spacing:.3px}
  .route .arrow{color:var(--muted);margin:0 6px}
  .meta{color:var(--muted);font-size:13px;margin-top:2px}
  .meta .sep{opacity:.5;margin:0 6px}
  .meta .txn{font-variant-numeric:tabular-nums;opacity:.7;cursor:help}
  .price{font-size:22px;font-weight:800;text-align:right;white-space:nowrap}
  .tier{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.4px;
    text-transform:uppercase;padding:2px 7px;border-radius:6px;margin-bottom:3px}
  .tier.good{background:var(--good-bg);color:var(--good)}
  .tier.great{background:var(--great-bg);color:var(--great)}
  .tier.exceptional{background:var(--exceptional-bg);color:var(--exceptional)}
  /* fare = a browse snapshot (cheapest fare on the route), not a deal */
  .tier.fare{background:rgba(120,144,156,.16);color:#607d8b}
  .why{grid-column:1/-1;color:var(--muted);font-size:12.5px}
  .book{grid-column:1/-1;justify-self:start;margin-top:4px}
  .book a{display:inline-block;background:var(--brand);color:#fff;font-weight:600;
    font-size:13px;padding:7px 14px;border-radius:9px}
  .tag{display:inline-block;font-size:11px;font-weight:700;color:var(--brand-ink);
    border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:2px}
  .tag.value{color:var(--great);border-color:var(--great)}
  .empty{text-align:center;color:var(--muted);padding:40px 0}
  footer{color:var(--muted);font-size:12px;margin-top:26px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>✈️ Flight Deals</h1>
    <div class="sub">Cheap fares from North America &amp; Europe, scanned on Google Flights.</div>
  </header>

  <section class="status" id="status" aria-live="polite">
    <div class="row"><span class="pill" id="statePill">Loading…</span>
      <span class="sub" id="updated"></span></div>
    <div class="bar" id="barWrap" hidden><i id="bar" style="width:0%"></i></div>
    <div class="queue" id="queue" hidden></div>
  </section>

  <div class="controls">
    <input type="search" id="q" placeholder="Search route, city, airline…" autocomplete="off">
    <div class="seg" id="trip">
      <button data-v="all" class="on">All</button>
      <button data-v="one_way">One-way</button>
      <button data-v="round_trip">Round-trip</button>
    </div>
    <select id="sort">
      <option value="new">Newest</option>
      <option value="cheap">Cheapest</option>
      <option value="value">Best value ($/hr for length)</option>
      <option value="depart">By departure</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <div class="filters">
    <div id="msOrigins" class="ms"></div>
    <div id="msDests" class="ms"></div>
    <div id="msAirlines" class="ms"></div>
  </div>
  <div class="filters">
    <label>Max price <input id="fPrice" type="number" min="0" step="50" placeholder="any"><span class="u">C$</span></label>
    <label>Flight <input id="fMinH" type="number" min="0" max="24" step="1" placeholder="min"><span class="u">–</span><input id="fMaxH" type="number" min="0" max="24" step="1" placeholder="max"><span class="u">h</span></label>
    <label>Max <input id="fMaxPph" type="number" min="0" step="5" placeholder="any"><span class="u">$/hr</span></label>
    <select id="fStops">
      <option value="">Any stops</option>
      <option value="0">Nonstop only</option>
      <option value="1">Max 1 stop</option>
    </select>
    <select id="fTier">
      <option value="">Deals (any tier)</option>
      <option value="great">Great or better</option>
      <option value="exceptional">Exceptional only</option>
      <option value="fare">Fare snapshots only</option>
      <option value="all">Deals + fare snapshots</option>
    </select>
    <label>Depart <input id="fAfter" type="date"><span class="u">–</span><input id="fBefore" type="date"></label>
    <label class="chk"><input type="checkbox" id="fValue"> Value only</label>
    <button id="btnClear" class="clr" hidden>Clear all ✕</button>
  </div>

  <div class="deals" id="deals"></div>
  <div class="empty" id="empty" hidden>No matching deals right now.</div>

  <footer id="foot">
    Prices were available when scanned and can change at any time. Always
    confirm the final fare and conditions on Google Flights before booking.
  </footer>
</div>

<script>
const $ = s => document.querySelector(s);
let DEALS = [], trip = "all";

function fmtDate(d){ if(!d) return ""; const [y,m,day]=d.split("-");
  return new Date(y,m-1,day).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function fmtDur(m){ if(!m||m<=0) return ""; return `${Math.floor(m/60)}h${String(m%60).padStart(2,"0")}`; }
function ago(iso){ if(!iso) return ""; const t=new Date(iso); if(isNaN(t)) return "";
  const s=Math.max(0,(Date.now()-t)/1000);
  if(s<90) return "just now"; if(s<3600) return Math.round(s/60)+" min ago";
  if(s<86400) return Math.round(s/3600)+" h ago"; return Math.round(s/86400)+" d ago"; }
// Read the tier from the [TIER] prefix the scanner writes. Substring-matching
// the whole reason silently mislabelled deals once reasons could contain the
// word "great" — e.g. "[GOOD] great value: C$48/airborne-hour" badged GREAT.
function tierOf(why){
  const m=/^\[(GOOD|GREAT|EXCEPTIONAL|FARE)\]/.exec((why||"").trim());
  return m ? m[1].toLowerCase() : "good";   // untagged legacy rows = good
}
function isFare(d){ return tierOf(d.whyDeal)==="fare"; }

function renderStatus(s){
  const pill=$("#statePill"), upd=$("#updated"),
        barWrap=$("#barWrap"), bar=$("#bar"), q=$("#queue");
  if(s && s.running){
    pill.className="pill live";
    const pct=(s.percent!=null)?` — ${s.percent}%`:"";
    pill.innerHTML=`<span class="dot"></span>Scanning now${s.mode?` (${s.mode})`:""}${pct}`;
    if(s.percent!=null){ barWrap.hidden=false; bar.style.width=s.percent+"%"; }
    else barWrap.hidden=true;
    const checks=(s.checksPlanned)?` · ${s.checksDone.toLocaleString()} / ${s.checksPlanned.toLocaleString()} checks`:"";
    upd.textContent=`updated ${ago(s.updatedAt)}${checks}`;
  } else {
    pill.className="pill"; pill.textContent="Idle — not scanning";
    barWrap.hidden=true;
    upd.textContent=s&&s.updatedAt?`last scan ${ago(s.updatedAt)}`:"";
  }
  if(s && s.queuedCount>0){
    q.hidden=false;
    q.innerHTML=`<b>Up next (${s.queuedCount}):</b> `+
      (s.queued||[]).map(x=>`<span class="qchip">${esc(x.label)}</span>`).join("");
  } else q.hidden=true;
}
function esc(t){ const d=document.createElement("div"); d.textContent=t==null?"":t; return d.innerHTML; }

// Data-driven multi-select with an inline filter box.
function makeMulti(sel, label){
  const wrap=$(sel);
  wrap.innerHTML=`<button type="button" class="ms-btn">${label}</button>
    <div class="ms-pop" hidden>
      <input class="ms-search" placeholder="filter ${label.toLowerCase()}…" autocomplete="off">
      <div class="ms-list"></div>
      <div class="ms-actions"><span class="ms-count"></span><button type="button" class="ms-clear">Clear</button></div>
    </div>`;
  const btn=wrap.querySelector(".ms-btn"), pop=wrap.querySelector(".ms-pop"),
        list=wrap.querySelector(".ms-list"), search=wrap.querySelector(".ms-search"),
        cnt=wrap.querySelector(".ms-count");
  let options=[], selected=new Set(), onchange=()=>{};
  const relabel=()=>{ btn.textContent = selected.size ? `${label} · ${selected.size}` : label;
    btn.classList.toggle("on", selected.size>0); cnt.textContent = `${selected.size} selected`; };
  function draw(){
    const q=search.value.trim().toLowerCase();
    const opts=options.filter(o=>o.toLowerCase().includes(q));
    list.innerHTML = opts.slice(0,400).map(o=>
      `<label class="ms-item"><input type="checkbox" value="${esc(o)}" ${selected.has(o)?"checked":""}> ${esc(o)}</label>`
    ).join("") || "<div class='ms-empty'>no matches</div>";
    for(const inp of list.querySelectorAll("input"))
      inp.onchange=e=>{ e.target.checked?selected.add(e.target.value):selected.delete(e.target.value); relabel(); onchange(); };
  }
  btn.onclick=e=>{ e.stopPropagation();
    document.querySelectorAll(".ms-pop").forEach(p=>{ if(p!==pop) p.hidden=true; });
    pop.hidden=!pop.hidden; if(!pop.hidden){ search.value=""; draw(); search.focus(); } };
  search.oninput=draw;
  pop.onclick=e=>e.stopPropagation();
  wrap.querySelector(".ms-clear").onclick=()=>{ selected.clear(); relabel(); draw(); onchange(); };
  return { setOptions(v){ options=v; draw(); }, get selected(){ return selected; },
           set onChange(f){ onchange=f; }, reset(){ selected.clear(); relabel(); } };
}
document.addEventListener("click",()=>document.querySelectorAll(".ms-pop").forEach(p=>p.hidden=true));
const msOrigins=makeMulti("#msOrigins","Origins"),
      msDests=makeMulti("#msDests","Destinations"),
      msAirlines=makeMulti("#msAirlines","Airlines");

function render(){
  const term=$("#q").value.trim().toLowerCase();
  const sort=$("#sort").value;
  const maxPrice=parseFloat($("#fPrice").value)||Infinity;
  const minH=parseFloat($("#fMinH").value)||0;
  const maxH=parseFloat($("#fMaxH").value)||Infinity;
  const maxPph=parseFloat($("#fMaxPph").value)||Infinity;
  const maxStops=$("#fStops").value===""?Infinity:parseInt($("#fStops").value,10);
  const tierF=$("#fTier").value;
  const after=$("#fAfter").value, before=$("#fBefore").value;
  const valueOnly=$("#fValue").checked;
  const origins=msOrigins.selected, dests=msDests.selected, airlines=msAirlines.selected;
  const active = maxPrice<Infinity||minH>0||maxH<Infinity||maxPph<Infinity||maxStops<Infinity
    ||tierF||after||before||valueOnly||origins.size||dests.size||airlines.size;
  $("#btnClear").hidden=!active;
  let list=DEALS.filter(d=>{
    if(trip!=="all" && d.tripType!==trip) return false;
    if(origins.size && !origins.has(d.origin)) return false;
    if(dests.size && !dests.has(d.destination)) return false;
    if(airlines.size){ const das=(d.airline||"").split(",").map(s=>s.trim()); if(!das.some(a=>airlines.has(a))) return false; }
    if(d.priceCad>maxPrice) return false;
    const h=(d.durationMin||0)/60;
    if(minH>0 && (!d.durationMin || h<minH)) return false;      // unknown length excluded when filtering
    if(maxH<Infinity && (!d.durationMin || h>maxH)) return false;
    if((d.pricePerHour>0?d.pricePerHour:Infinity) > maxPph) return false; // unknown $/hr excluded when filtering
    if((d.stops||0) > maxStops) return false;
    if(valueOnly && !d.valueDeal) return false;
    // Fare snapshots are the cheapest fare on a route, not deals — keep them
    // out of the default deals view, but browsable via the tier select.
    const t=tierOf(d.whyDeal);
    if(tierF==="fare"){ if(t!=="fare") return false; }
    else if(tierF!=="all" && t==="fare") return false;
    if(tierF==="great" && t==="good") return false;
    if(tierF==="exceptional" && t!=="exceptional") return false;
    if(after && (d.flightDate||"") < after) return false;
    if(before && (d.flightDate||"") > before) return false;
    if(!term) return true;
    return (d.route+" "+d.origin+" "+d.destination+" "+(d.airline||"")).toLowerCase().includes(term);
  });
  const pph=d=>d.pricePerHour>0?d.pricePerHour:Infinity;
  // "Best value" shows only fares that beat the $/hr bar for their length,
  // so long-haul value surfaces instead of short cheap hops.
  if(sort==="value") list=list.filter(d=>d.valueDeal);
  const foundKey=d=>d.foundAt||d.foundOn||"";
  // "Newest" sorts by txnId first: a persisted, ever-increasing transaction
  // number assigned once per deal when it's found, so it never ties (unlike
  // dates/timestamps, where many deals share the same day or even second).
  // Comparing two deals' txnId always tells you definitively which came
  // first. Rows from before this field existed are txnId=0 and fall back
  // to foundAt/foundOn.
  list.sort((a,b)=> sort==="cheap" ? a.priceCad-b.priceCad
    : sort==="value" ? pph(a)-pph(b) || a.priceCad-b.priceCad
    : sort==="depart" ? (a.flightDate||"").localeCompare(b.flightDate||"")
    : (b.txnId||0)-(a.txnId||0) || foundKey(b).localeCompare(foundKey(a)));
  const LIMIT=250;
  const shown=Math.min(list.length,LIMIT);
  $("#count").textContent = list.length>LIMIT
    ? `showing ${shown} of ${list.length.toLocaleString()} — refine to see more`
    : `${list.length} deal${list.length===1?"":"s"}`;
  $("#empty").textContent = sort==="value"
    ? "No value deals right now — no fares are beating the $/hr bar for their flight length."
    : "No matching deals right now.";
  $("#empty").hidden=list.length>0;
  $("#deals").innerHTML=list.slice(0,LIMIT).map(card).join("");
}
function card(d){
  const rt=d.tripType==="round_trip";
  const dates=rt&&d.returnDate?`${fmtDate(d.flightDate)} → ${fmtDate(d.returnDate)}`:fmtDate(d.flightDate);
  const tier=tierOf(d.whyDeal);
  const stops=d.stops>0?`${d.stops} stop${d.stops>1?"s":""}`:"nonstop";
  const dur=d.durationMin>0?fmtDur(d.durationMin):"";
  const pph=d.pricePerHour>0?`<b>C$${d.pricePerHour}/hr</b> flying`:"";
  const extra=[dur,pph].filter(Boolean).map(x=>`<span class="sep">·</span>${x}`).join("");
  const txn=d.txnId>0?`<span class="txn" title="Transaction #${d.txnId} — a unique, ever-increasing number assigned when this deal was found, so it can always be ranked by true discovery order">#${d.txnId}</span>`:"";
  return `<article class="deal">
    <div>
      <span class="tier ${tier}">${tier}</span>
      <div class="route">${esc(d.origin)}<span class="arrow">${rt?"⇄":"→"}</span>${esc(d.destination)}
        ${rt?'<span class="tag">round trip</span>':''}${d.valueDeal?'<span class="tag value">value</span>':''}</div>
      <div class="meta">${dates}<span class="sep">·</span>${esc(d.airline||"—")}<span class="sep">·</span>${stops}${extra}${txn?`<span class="sep">·</span>${txn}`:""}</div>
    </div>
    <div class="price">C$${Number(d.priceCad).toLocaleString()}</div>
    ${d.whyDeal?`<div class="why">${esc(d.whyDeal)}</div>`:""}
    <div class="book"><a href="${esc(d.bookingUrl)}" target="_blank" rel="noopener">Book on Google Flights →</a></div>
  </article>`;
}

async function load(){
  try{
    // GitHub Pages' CDN caches responses for up to 10 min (Cache-Control:
    // max-age=600) and keys its cache by path only, ignoring the query
    // string -- so this does NOT defeat the CDN cache (verified), only
    // the browser's own cache (on top of cache:"no-store" below). A ~10
    // min lag between a publish and it showing here is an inherent
    // GitHub Pages limit, not a bug.
    const bust="?t="+Date.now();
    const [dz,sz]=await Promise.all([
      fetch("deals.json"+bust,{cache:"no-store"}).then(r=>r.json()),
      fetch("status.json"+bust,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null)
    ]);
    DEALS=Array.isArray(dz)?dz:[];
    populateFilters();
    renderStatus(sz); render();
  }catch(e){
    $("#statePill").textContent="Could not load deals";
    $("#empty").hidden=false;
  }
}
function populateFilters(){
  const uniq=arr=>[...new Set(arr.filter(Boolean))].sort();
  msOrigins.setOptions(uniq(DEALS.map(d=>d.origin)));
  msDests.setOptions(uniq(DEALS.map(d=>d.destination)));
  msAirlines.setOptions(uniq(DEALS.flatMap(d=>(d.airline||"").split(",").map(s=>s.trim()))));
}
$("#q").addEventListener("input",render);
$("#sort").addEventListener("change",render);
["#fPrice","#fMinH","#fMaxH","#fMaxPph","#fAfter","#fBefore"].forEach(id=>$(id).addEventListener("input",render));
["#fStops","#fTier"].forEach(id=>$(id).addEventListener("change",render));
$("#fValue").addEventListener("change",render);
[msOrigins,msDests,msAirlines].forEach(m=>m.onChange=render);
$("#btnClear").addEventListener("click",()=>{
  ["#fPrice","#fMinH","#fMaxH","#fMaxPph","#fAfter","#fBefore"].forEach(id=>$(id).value="");
  $("#fStops").value=""; $("#fTier").value=""; $("#fValue").checked=false;
  [msOrigins,msDests,msAirlines].forEach(m=>m.reset()); render();});
$("#trip").addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b) return;
  trip=b.dataset.v; [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b)); render(); });
load();
setInterval(load, 60000); // refresh status/deals each minute
</script>
</body>
</html>
